name: Actualizar Recomendacion AFP

on:
  schedule:
    - cron: '0 12 * * *' # Corre todos los días a las 08:00 AM hora Chile (aprox)
  workflow_dispatch:      # Permite ejecutarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Permiso para guardar los cambios en el repo

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Acelera las ejecuciones futuras

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml openpyxl matplotlib

      - name: Ejecutar Scraper y Recomendador
        run: |
          # Ejecutamos el script principal
          # Nota: Si el archivo principal tiene otro nombre, cámbialo aquí
          python main.py 

      - name: Guardar resultados en el repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Actualización automática: $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios para committear"
          git push
